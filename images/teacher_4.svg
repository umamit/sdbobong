<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-images_teacher_4_svg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#155B8B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#329D9C;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#grad-images_teacher_4_svg)" />
  
  <!-- Decorative Abstract Shapes -->
  <circle cx="360.0" cy="100.0" r="200.0" fill="#ffffff" opacity="0.08" />
  <rect x="-40.0" y="350.0" width="160.0" height="200.0" rx="20" transform="rotate(30)" fill="#ffffff" opacity="0.05" />
  
  <!-- Icon / Emoji -->
  <text x="50%" y="45%" font-family="'Outfit', -apple-system, sans-serif" font-size="110.0" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)">
    👩‍🏫
  </text>
  
  <!-- Title -->
  <text x="50%" y="70%" font-family="'Outfit', -apple-system, sans-serif" font-size="35" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    Nurul Hidayah, S.Pd.I.
  </text>
  
  <!-- Subtitle -->
  <text x="50%" y="82%" font-family="'Inter', -apple-system, sans-serif" font-size="25" fill="#E5E7EB" opacity="0.9" text-anchor="middle" dominant-baseline="middle">
    Guru Agama Islam (PNS)
  </text>
</svg>
