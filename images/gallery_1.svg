<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-images_gallery_1_svg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B3C5D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#155B8B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#grad-images_gallery_1_svg)" />
  
  <!-- Decorative Abstract Shapes -->
  <circle cx="720.0" cy="120.0" r="240.0" fill="#ffffff" opacity="0.08" />
  <rect x="-80.0" y="420.0" width="320.0" height="240.0" rx="20" transform="rotate(30)" fill="#ffffff" opacity="0.05" />
  
  <!-- Icon / Emoji -->
  <text x="50%" y="45%" font-family="'Outfit', -apple-system, sans-serif" font-size="132.0" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)">
    ✍️
  </text>
  
  <!-- Title -->
  <text x="50%" y="70%" font-family="'Outfit', -apple-system, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    Belajar Aktif
  </text>
  
  <!-- Subtitle -->
  <text x="50%" y="82%" font-family="'Inter', -apple-system, sans-serif" font-size="30" fill="#E5E7EB" opacity="0.9" text-anchor="middle" dominant-baseline="middle">
    Pembelajaran Kelas Menyenangkan
  </text>
</svg>
