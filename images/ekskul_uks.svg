  <rect x="-60.0" y="315.0" width="240.0" height="180.0" rx="20" transform="rotate(30)" fill="#ffffff" opacity="0.05" />
  
  <!-- Icon / Emoji -->
  <text x="50%" y="45%" font-family="'Outfit', -apple-system, sans-serif" font-size="99.0" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)">
    🏥
  </text>
  
  <!-- Title -->
  <text x="50%" y="70%" font-family="'Outfit', -apple-system, sans-serif" font-size="31" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
