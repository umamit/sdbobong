  </text>
  
  <!-- Subtitle -->
  <text x="50%" y="82%" font-family="'Inter', -apple-system, sans-serif" font-size="22" fill="#E5E7EB" opacity="0.9" text-anchor="middle" dominant-baseline="middle">
